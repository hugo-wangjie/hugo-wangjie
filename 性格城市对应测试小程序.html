            // 如果已经选过相同选项，则取消选择
            if (selectedOptions[currentQuestionIndex] === opt) {
                // 取消选中
                selectedOptions[currentQuestionIndex] = null;
                // 从分数中扣除
                const dim = questions[currentQuestionIndex].dim;
                if (opt === 'A') {
                    scores[dim[0]]--;
                } else {
                    scores[dim[1]]--;
                }
            } else {
                // 如果有旧选项，先减去旧分数
                if (selectedOptions[currentQuestionIndex] !== null) {
                    const oldOpt = selectedOptions[currentQuestionIndex];
                    const oldDim = questions[currentQuestionIndex].dim;
                    if (oldOpt === 'A') {
                        scores[oldDim[0]]--;
                    } else {
                        scores[oldDim[1]]--;
                    }
                }
                // 设置新选项，增加分数
                selectedOptions[currentQuestionIndex] = opt;
                const dim = questions[currentQuestionIndex].dim;
                if (opt === 'A') {
                    scores[dim[0]]++;
                } else {
                    scores[dim[1]]++;
                }
            }
            // 重新渲染以更新选中样式
            renderQuestion();
        }

        function nextQuestion() {
            // 如果当前题没选，也能继续（不强制）
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            } else {
                // 计算最终结果
                calculateResult();
            }
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        }

        function calculateResult() {
            // 计算四个维度
            const ei = scores.E >= scores.I ? 'E' : 'I';
            const sn = scores.S >= scores.N ? 'S' : 'N';
            const tf = scores.T >= scores.F ? 'T' : 'F';
            const jp = scores.J >= scores.P ? 'J' : 'P';
            const mbti = ei + sn + tf + jp;

            // 查找匹配城市
            const match = cityMatch[mbti] || { city: "未知", desc: "无法匹配，请重试。", image: "" };
            document.getElementById('result-city').innerText = match.city;
            document.getElementById('result-mbti').innerText = mbti + ' ' + getMbtiName(mbti);
            document.getElementById('result-desc').innerText = match.desc;
            // 设置城市图片，如果没有图片则显示占位灰色背景
            if (match.image) {
                document.getElementById('result-image').style.backgroundImage = "url('" + match.image + "')";
            } else {
                document.getElementById('result-image').style.backgroundImage = "url('https://via.placeholder.com/400x200?text=City+Image')";
            }

            // 切换到结果页
            document.getElementById('page-test').classList.remove('active');
            document.getElementById('page-result').classList.add('active');
        }

        function getMbtiName(mbti) {
            const names = {
                "INTJ":"建筑师","INTP":"逻辑学家","ENTJ":"指挥官","ENTP":"辩论家",
                "INFJ":"提倡者","INFP":"调停者","ENFJ":"主人公","ENFP":"竞选者",
                "ISTJ":"物流师","ISFJ":"守卫者","ESTJ":"总经理","ESFJ":"执政官",
                "ISTP":"鉴赏家","ISFP":"探险家","ESTP":"企业家","ESFP":"表演者"
            };
            return names[mbti] || "";
        }

        function restartTest() {
            document.getElementById('page-result').classList.remove('active');
            document.getElementById('page-home').classList.add('active');
        }
    </script>
</body>
